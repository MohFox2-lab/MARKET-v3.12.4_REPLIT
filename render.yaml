services:
  - type: web
    name: market-sentinel-ar
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci
    startCommand: npm start
    autoDeploy: true
    envVars:
      # Runtime
      - key: NODE_VERSION
        value: 20.20.0

      # Required (session signing)
      - key: SESSION_SECRET
        sync: false

      # Database (auto-filled from the Postgres resource below)
      - key: DATABASE_URL
        fromDatabase:
          name: market-sentinel-db
          property: connectionString

      # CORS (set to your Render URL after first deploy, or keep * for quick testing)
      - key: CORS_ORIGIN
        value: "*"

      # Safe defaults
      - key: AUTO_MIGRATE
        value: "true"

      # Housekeeping
      - key: AUTO_HOUSEKEEPING
        value: "true"
      - key: SNAPSHOT_RETENTION_DAYS
        value: "180"
      - key: HOUSEKEEPING_INTERVAL_HOURS
        value: "168"
      - key: HOUSEKEEPING_VACUUM
        value: "false"

      # Provider keys (optional — leave empty if you use demo/free mode)
      - key: STOCK_PROVIDER
        value: "finnhub"
      - key: FINNHUB_KEY
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: EODHD_KEY
        sync: false

      # Saudi (SAHMK) — optional but recommended for Tadawul quotes
      - key: SAHMK_KEY
        sync: false

      # Intraday (optional)
      - key: INTRADAY_DISABLED
        value: "true"

databases:
  - name: market-sentinel-db
    plan: free
    # postgresMajorVersion: "17"
